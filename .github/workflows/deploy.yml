name: Deploy

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:  
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: docker

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
        - uses: actions/checkout@v4

        - name: Setup Rust
          uses: https://github.com/dtolnay/rust-toolchain@stable
          with:
            toolchain: stable
            targets: wasm32-unknown-unknown

        - name: Install Trunk
          uses: https://github.com/taiki-e/install-action@v2
          with:
            tool: wasm-bindgen,trunk

        - name: Build with Trunk
          run: trunk build --release --public-url ./

        - name: Deploy with rsync
          uses: burnett01/rsync-deployments@v8
          with:
            switches: -avzr --delete
            path: dist/
            remote_path: ${{ secrets.RSYNC_REMOTE_PATH }}
            remote_host: ${{ secrets.RSYNC_REMOTE_HOST }}
            remote_port: ${{ secrets.RSYNC_REMOTE_PORT }}
            remote_user: ${{ secrets.RSYNC_REMOTE_USER }}
            remote_key:  ${{ secrets.RSYNC_REMOTE_KEY  }}
